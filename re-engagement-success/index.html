<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Let's Stay Connected</title>
<meta name="robots" content="noindex, nofollow">

<!-- Favicon -->
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/assets/images/favicon-32x32.png" sizes="32x32" type="image/png">
<link rel="icon" href="/assets/images/favicon-192x192.png" sizes="192x192" type="image/png">
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400;1,700&family=Raleway:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: rgb(44, 63, 54);
    color: #F8F6F2;
    font-family: 'Raleway', sans-serif;
    font-weight: 400;
    min-height: 100vh;
  }

  .container {
    max-width: 60rem;
    width: 100%;
    margin: 0 auto;
    padding: 4.4375rem 1.5rem 3rem;
    text-align: center;
  }

  .logo {
    display: block;
    width: 13.75rem;
    height: auto;
    margin: 0 auto 1.9375rem;
  }

  h1 {
    font-family: 'Libre Baskerville', serif;
    font-weight: 700;
    font-size: 2rem;
    line-height: 2.8rem;
    color: #F8F6F2;
    text-align: center;
    max-width: 40.0625rem;
    margin: 0 auto 1.5rem;
  }

  h3 {
    font-family: 'Libre Baskerville', serif;
    font-weight: 400;
    font-size: 1.25rem;
    line-height: 1.75rem;
    color: #F8F6F2;
    text-align: center;
    max-width: 36.3125rem;
    margin: 0 auto 1.5625rem;
  }

  h3 strong {
    font-weight: 700;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: #C2A86C;
    color: #FFFFFF;
    font-family: 'Raleway', sans-serif;
    font-weight: 600;
    font-size: 1.25rem;
    text-decoration: none;
    border-radius: 3px;
    width: 24.375rem;
    max-width: 100%;
    height: 3.4375rem;
    transition: background 0.3s ease;
  }

  .cta-btn:hover {
    text-decoration: none;
  }

  /* Mobile */
  @media screen and (max-width: 767px) {
    .container {
      max-width: 400px;
      padding: 2.5rem 1.25rem 3rem;
    }

    .logo {
      width: 10.9375rem;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2rem;
      line-height: 2.4rem;
      max-width: 20rem;
      margin-bottom: 1.5rem;
    }

    h3 {
      font-size: 1.25rem;
      line-height: 1.75rem;
      max-width: 20rem;
      margin-bottom: 2rem;
    }

    .cta-btn {
      width: 20rem;
      height: 4.5625rem;
    }
  }
</style>
</head>
<body>
<main class="container">
  <img src="/assets/images/jm-logo-white.png" alt="Jason Moss" class="logo" width="220" height="49">

  <h1>Thanks for opting back in. You'll continue receiving my emails.</h1>

  <h3>Looking for grounded strategies to grow your online business? Explore my YouTube channel, with hundreds of free trainings to help you scale in a way that feels <strong>clear, spacious, and true to you</strong>.</h3>

  <a href="https://www.youtube.com/@jasonmossofficial" class="cta-btn">Explore Free Trainings</a>
</main>
</body>
</html>
